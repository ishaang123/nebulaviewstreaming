name: Force Hugging Face Factory Rebuild

on:
  schedule:
    # This cron expression runs exactly every 5 hours
    - cron: '0 */5 * * *'
  workflow_dispatch: # This lets you click a button in GitHub to test it manually

jobs:
  rebuild-space:
    runs-on: ubuntu-latest
    steps:
      - name: Call Hugging Face API for Factory Restart
        run: |
          curl -X POST "https://huggingface.co/api/spaces/ishaan2/nebulaviwstreaming/restart?factory=true" \
          -H "Authorization: Bearer ${{ secrets.HF_SECRET }}"
